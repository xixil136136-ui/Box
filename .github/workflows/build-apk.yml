name: 编译全能看APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "17" }
      - uses: android-actions/setup-android@v3
      - run: |
          chmod +x gradlew
          if [ ! -f local.properties ]; then
            echo "sdk.dir=$ANDROID_HOME" > local.properties
            echo "local.properties created"
          fi
      - run: ./gradlew assembleArm64GenericNormalRelease assembleArmeabiGenericNormalRelease --no-daemon -Dorg.gradle.jvmargs=-Xmx2048m
      - name: Collect APK
        run: |
          mkdir -p apk_output/
          find . -path ./app/build/outputs -name "*.apk" -type f | while read apk; do
            cp -v "$apk" apk_output/
          done
          echo "=== APKs found ==="
          ls -la apk_output/ || echo "No APKs"
      - uses: actions/upload-artifact@v4
        with:
          name: 全能看-APK
          path: apk_output/*.apk

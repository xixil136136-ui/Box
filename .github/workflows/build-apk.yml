name: 编译全能看APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "17" }
      - uses: android-actions/setup-android@v3
      - run: |
          chmod +x gradlew
          if [ ! -f local.properties ]; then
            echo "sdk.dir=$ANDROID_HOME" > local.properties
            echo "local.properties created"
          fi
      - run: ./gradlew assembleArm64GenericNormalRelease assembleArmeabiGenericNormalRelease --no-daemon -Dorg.gradle.jvmargs=-Xmx2048m
      - run: mkdir -p apk_output/ && find . -name "*.apk" -type f | while read apk; do cp "$apk" apk_output/; done
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: apk_output/*.apk
          tag_name: v1.0.0
          name: 全能看 v1.0.0
          body: |
            ## 🎬 全能看 v1.0.0
            
            基于 TVBox 定制的影视聚合播放器。
            
            ### ✨ 功能特点
            - 📺 IPTV 直播 + 影视点播
            - ⚙️ 可自由配置数据源
            - 🔞 管理员密码保护 - 成人内容开关
            - 📱 手机/平板/电视 全适配
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: \${{ secrets.GITHUB_TOKEN }}

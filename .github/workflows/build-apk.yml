name: 编译全能看APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-java@v4
        with: { distribution: "temurin", java-version: "17" }
      - uses: android-actions/setup-android@v3
      - run: |
          chmod +x gradlew
          if [ ! -f local.properties ]; then
            echo "sdk.dir=$ANDROID_HOME" > local.properties
            echo "local.properties created"
          fi
      - run: ./gradlew assembleRelease --build-cache --parallel --daemon --no-daemon
      - run: mkdir -p apk_output/ && find . -name "*.apk" -type f | while read apk; do cp "$apk" apk_output/; done
      - uses: actions/upload-artifact@v4
        with: { name: "全能看-APK", path: "apk_output/*.apk" }

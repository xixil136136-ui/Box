<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全能看 · 卡密管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#0d0d1a;color:#e0e0ee;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0d0d1a}::-webkit-scrollbar-thumb{background:#e94560;border-radius:3px}

/* ── Login ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:#1a1a2e;padding:48px;border-radius:16px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.login-box h1{text-align:center;font-size:22px;margin-bottom:4px;background:linear-gradient(135deg,#e94560,#4a9eff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-box p{text-align:center;color:#6b6b80;font-size:13px;margin-bottom:28px}
.login-box input,.login-box button{width:100%;padding:14px 16px;border-radius:8px;border:none;font-size:15px;margin-bottom:14px;outline:none}
.login-box input{background:#0d0d1a;color:#e0e0ee;border:1px solid #2a2a40}
.login-box input:focus{border-color:#e94560}
.login-box button{background:#e94560;color:#fff;font-weight:700;cursor:pointer;transition:background .2s}
.login-box button:hover{background:#ff6b81}
.login-box .err{color:#e94560;text-align:center;font-size:13px;margin-bottom:12px;display:none}

/* ── Layout ── */
.app{display:none}
.header{background:#1a1a2e;border-bottom:1px solid #2a2a40;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header .brand{font-size:18px;font-weight:700}.header .brand span{color:#e94560}
.header .info{font-size:13px;color:#6b6b80}
.header .logout{padding:6px 18px;border-radius:6px;border:1px solid #e94560;background:transparent;color:#e94560;cursor:pointer;font-size:13px}
.header .logout:hover{background:#e94560;color:#fff}
.main{padding:24px 28px;max-width:1400px;margin:0 auto}
.main h2{font-size:17px;margin-bottom:16px;color:#e94560}

/* ── Stats ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:#1a1a2e;border-radius:12px;padding:20px;text-align:center;border:1px solid #2a2a40}
.stat-card .num{font-size:28px;font-weight:700}.stat-card .num.accent{color:#e94560}.stat-card .num.blue{color:#4a9eff}.stat-card .num.green{color:#2ecc71}.stat-card .num.orange{color:#f39c12}
.stat-card .lbl{font-size:12px;color:#6b6b80;margin-top:4px}

/* ── Forms ── */
.card-form{background:#1a1a2e;border-radius:12px;padding:24px;display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-bottom:28px;border:1px solid #2a2a40}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;color:#6b6b80}
.form-group input{padding:10px 14px;border-radius:6px;border:1px solid #2a2a40;background:#0d0d1a;color:#e0e0ee;font-size:14px;outline:none;min-width:100px}
.form-group input:focus{border-color:#4a9eff}
.btn{padding:10px 28px;border-radius:6px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.btn-primary{background:#e94560;color:#fff}.btn-primary:hover{background:#ff6b81}
.btn-blue{background:#4a9eff;color:#fff}.btn-blue:hover{filter:brightness(1.15)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-danger{background:#c0392b;color:#fff}.btn-danger:hover{background:#e74c3c}
.btn-warn{background:#f39c12;color:#fff;margin-right:4px}.btn-warn:hover{background:#f1c40f}

/* ── Table ── */
.table-wrap{background:#1a1a2e;border-radius:12px;overflow:hidden;border:1px solid #2a2a40;margin-bottom:24px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:#0d0d1a}
th{padding:12px 14px;text-align:left;color:#6b6b80;font-weight:600;font-size:12px;text-transform:uppercase;white-space:nowrap}
td{padding:11px 14px;border-top:1px solid #2a2a40}
tr:hover td{background:rgba(233,69,96,.04)}
.tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600}
.tag-active{background:rgba(46,204,113,.15);color:#2ecc71}
.tag-expired{background:rgba(192,57,43,.15);color:#e74c3c}
.tag-bound{background:rgba(74,158,255,.15);color:#4a9eff}
.tag-unbound{background:rgba(243,156,18,.15);color:#f39c12}
.card-key{font-family:monospace;font-size:13px;color:#4a9eff;letter-spacing:.5px}
.device-id{font-family:monospace;font-size:12px;color:#a0a0b8;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}
.actions{display:flex;gap:4px;flex-wrap:wrap}

/* ── Toast ── */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#e0e0ee;padding:14px 28px;border-radius:10px;z-index:9999;opacity:0;transition:.3s;border:1px solid #2a2a40;font-size:14px;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:#2ecc71}.toast.error{border-color:#e94560}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:5000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#1a1a2e;border-radius:12px;padding:32px;max-width:480px;width:90%;border:1px solid #2a2a40}
.modal-box h3{margin-bottom:12px}
.modal-box p{color:#6b6b80;font-size:14px;margin-bottom:20px}
.modal-box .btns{display:flex;gap:10px;justify-content:flex-end}

.loading{text-align:center;padding:40px;color:#6b6b80}
.loading:after{content:'';display:block;width:36px;height:36px;margin:12px auto;border:3px solid #2a2a40;border-top-color:#e94560;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .main{padding:16px}
  .header{padding:12px 16px;flex-wrap:wrap;gap:8px}
  .card-form{flex-direction:column;align-items:stretch}
  .form-group input{min-width:auto}
  .table-wrap{overflow-x:auto}
  td,th{white-space:nowrap;padding:8px 10px;font-size:12px}
}
</style>
</head>
<body>

<!-- ═══ 登录 ═══ -->
<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h1>全能看</h1>
    <p>卡密管理系统</p>
    <div class="err" id="loginErr"></div>
    <input type="password" id="loginPwd" placeholder="请输入管理员密码" autofocus>
    <input type="text" id="workerUrl" placeholder="Worker 地址" value="https://你的worker.workers.dev">
    <input type="text" id="bearerToken" placeholder="Bearer Token（首次留空自动获取）">
    <button onclick="doLogin()">登 录</button>
  </div>
</div>

<!-- ═══ 主界面 ═══ -->
<div class="app" id="app">
  <div class="header">
    <div class="brand">🎬<span>全能看</span> · 卡密管理</div>
    <div class="info" id="headerInfo">未登录</div>
    <button class="logout" onclick="doLogout()">退出</button>
  </div>

  <div class="main" id="mainContent">
    <div class="loading" id="loadingEl">加载中...</div>

    <!-- 统计卡片 -->
    <div id="statsArea" style="display:none">
      <div class="stats-grid" id="statsGrid"></div>
    </div>

    <!-- 生成卡密 -->
    <div id="genArea" style="display:none">
      <h2>📦 生成卡密</h2>
      <div class="card-form">
        <div class="form-group"><label>生成数量</label><input type="number" id="genCount" value="10" min="1" max="200"></div>
        <div class="form-group"><label>有效天数</label><input type="number" id="genDays" value="30" min="1" max="3650"></div>
        <div class="form-group"><label>备注标签</label><input type="text" id="genRemark" placeholder="如：VIP月卡"></div>
        <button class="btn btn-primary" onclick="generateCards()">🚀 生成卡密</button>
      </div>
    </div>

    <!-- 搜索 -->
    <div id="tableArea" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <h2>📋 卡密列表</h2>
        <div style="display:flex;gap:8px">
          <input type="text" id="searchInput" placeholder="搜索卡密/设备..." style="padding:8px 14px;border-radius:6px;border:1px solid #2a2a40;background:#0d0d1a;color:#e0e0ee;font-size:13px;outline:none;width:220px">
          <button class="btn btn-blue btn-sm" onclick="loadCards()">🔄 刷新</button>
        </div>
      </div>
      <div class="table-wrap"><table><thead><tr>
        <th>卡密</th><th>状态</th><th>设备绑定</th><th>创建时间</th><th>到期时间</th><th>剩余</th><th>备注</th><th>操作</th>
      </tr></thead><tbody id="cardTable"></tbody></table></div>
      <div id="tableInfo" style="text-align:center;color:#6b6b80;font-size:13px;padding:8px 0 24px"></div>
    </div>
  </div>
</div>

<!-- ═══ Toast ═══ -->
<div class="toast" id="toast"></div>

<!-- ═══ 确认弹窗 ═══ -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle">确认操作</h3>
    <p id="modalBody">确定要执行此操作吗？</p>
    <div class="btns">
      <button class="btn btn-sm" style="background:#2a2a40;color:#e0e0ee" onclick="closeModal()">取消</button>
      <button class="btn btn-sm btn-danger" id="modalConfirm" onclick="">确认</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  配置 - 修改这里的管理员密码
// ══════════════════════════════════════════════════════
const ADMIN_PASSWORD = "admin888";  // ← 改为你的密码

// ── 状态 ──
let state = { workerUrl: "", token: "", cards: [] };

// ── DOM ──
const $ = s => document.querySelector(s);
const el = {};

function cacheDom() {
  el.loginPage = $('#loginPage');
  el.app = $('#app');
  el.loginPwd = $('#loginPwd');
  el.workerUrl = $('#workerUrl');
  el.bearerToken = $('#bearerToken');
  el.loginErr = $('#loginErr');
  el.headerInfo = $('#headerInfo');
  el.loadingEl = $('#loadingEl');
  el.statsArea = $('#statsArea');
  el.genArea = $('#genArea');
  el.tableArea = $('#tableArea');
  el.statsGrid = $('#statsGrid');
  el.cardTable = $('#cardTable');
  el.tableInfo = $('#tableInfo');
  el.toast = $('#toast');
  el.modal = $('#modal');
  el.modalTitle = $('#modalTitle');
  el.modalBody = $('#modalBody');
  el.modalConfirm = $('#modalConfirm');
}

// ── API 调用 ──
async function api(method, path, body) {
  const url = state.workerUrl.replace(/\/+$/, '') + path;
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + state.token }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  return await r.json();
}

function showToast(msg, type = 'info') {
  el.toast.textContent = msg;
  el.toast.className = 'toast ' + type + ' show';
  clearTimeout(el.toast._t);
  el.toast._t = setTimeout(() => el.toast.classList.remove('show'), 3000);
}

function showModal(title, body, onConfirm) {
  el.modalTitle.textContent = title;
  el.modalBody.textContent = body;
  el.modal.classList.add('show');
  el.modalConfirm.onclick = () => { closeModal(); onConfirm(); };
}

function closeModal() { el.modal.classList.remove('show'); }

function formatTime(ts) {
  if (!ts) return '-';
  const d = new Date(ts);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function daysBetween(ts) {
  if (!ts) return '-';
  const d = Math.floor((ts - Date.now()) / 86400000);
  if (d < 0) return '<span style="color:#e74c3c">已过期</span>';
  if (d === 0) return '<span style="color:#f39c12">今天到期</span>';
  return `<span style="color:#2ecc71">${d} 天</span>`;
}

// ── 登录 ──
function doLogin() {
  const pwd = el.loginPwd.value.trim();
  if (pwd !== ADMIN_PASSWORD) {
    el.loginErr.textContent = '密码错误';
    el.loginErr.style.display = 'block';
    return;
  }
  el.loginErr.style.display = 'none';
  state.workerUrl = el.workerUrl.value.trim();
  state.token = el.bearerToken.value.trim();

  // 如果没填 Token，自动获取
  loginInit();
}

async function loginInit() {
  el.loginPage.style.display = 'none';
  el.app.style.display = 'block';
  el.headerInfo.textContent = `Worker: ${state.workerUrl}`;

  // 如果没 Token，尝试首次获取
  if (!state.token) {
    const r = await api('POST', '/admin/gen');
    if (r.admin_token) {
      state.token = r.admin_token;
      el.bearerToken.value = state.token;
      showToast('✅ 首次使用，Token: ' + state.token, 'success');
    } else if (r.msg && r.msg.includes('鉴权')) {
      showToast('❌ 需要填写正确的 Bearer Token', 'error');
      doLogout();
      return;
    }
  }

  loadData();
}

function doLogout() {
  el.app.style.display = 'none';
  el.loginPage.style.display = 'flex';
  state.token = '';
  state.cards = [];
}

// ── 加载数据 ──
async function loadData() {
  el.loadingEl.style.display = 'block';
  el.statsArea.style.display = 'none';
  el.genArea.style.display = 'none';
  el.tableArea.style.display = 'none';

  await Promise.all([loadStats(), loadCards()]);

  el.loadingEl.style.display = 'none';
  el.statsArea.style.display = 'block';
  el.genArea.style.display = 'block';
  el.tableArea.style.display = 'block';
}

async function loadStats() {
  try {
    const d = await api('GET', '/admin/stats');
    if (d.total_cards === undefined) return;
    el.statsGrid.innerHTML = `
      <div class="stat-card"><div class="num accent">${d.total_cards}</div><div class="lbl">总卡密</div></div>
      <div class="stat-card"><div class="num green">${d.active || 0}</div><div class="lbl">有效</div></div>
      <div class="stat-card"><div class="num orange">${d.expired || 0}</div><div class="lbl">已过期</div></div>
      <div class="stat-card"><div class="num blue">${d.bound_devices || 0}</div><div class="lbl">已绑定设备</div></div>
    `;
  } catch (e) {
    console.error('stats error', e);
  }
}

async function loadCards() {
  el.cardTable.innerHTML = '<tr><td colspan="8" class="loading" style="padding:30px">加载中...</td></tr>';
  try {
    const d = await api('GET', '/admin/query');
    state.cards = d.cards || [];
    renderCards();
  } catch (e) {
    el.cardTable.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:#e94560">加载失败: ' + e.message + '</td></tr>';
  }
}

function renderCards() {
  const search = (el.searchInput.value || '').toLowerCase();
  let filtered = state.cards;
  if (search) {
    filtered = filtered.filter(c =>
      (c.card_key || '').toLowerCase().includes(search) ||
      (c.device_id || '').toLowerCase().includes(search) ||
      (c.remark || '').toLowerCase().includes(search)
    );
  }

  if (filtered.length === 0) {
    el.cardTable.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:#6b6b80">暂无数据</td></tr>';
    el.tableInfo.textContent = '共 0 条';
    return;
  }

  let html = '';
  for (const c of filtered) {
    const active = c.expire_at && c.expire_at > Date.now();
    const bound = c.device_id && c.device_id !== '';
    const statusTag = active
      ? '<span class="tag tag-active">有效</span>'
      : '<span class="tag tag-expired">已过期</span>';
    const bindTag = bound
      ? '<span class="tag tag-bound">已绑定</span>'
      : '<span class="tag tag-unbound">未绑定</span>';
    const deviceDisplay = c.device_id || '<span style="color:#6b6b80">-</span>';

    html += `<tr>
      <td><span class="card-key">${c.card_key || '-'}</span></td>
      <td>${statusTag} ${bindTag}</td>
      <td><span class="device-id" title="${c.device_id || ''}">${deviceDisplay}</span></td>
      <td>${formatTime(c.create_at)}</td>
      <td>${formatTime(c.expire_at)}</td>
      <td>${daysBetween(c.expire_at)}</td>
      <td style="color:#6b6b80;font-size:12px">${c.remark || '-'}</td>
      <td class="actions">
        ${bound ? `<button class="btn btn-sm btn-warn" onclick="unbindCard('${c.card_key}')">解绑</button>` : ''}
        <button class="btn btn-sm btn-danger" onclick="deleteCard('${c.card_key}')">删除</button>
      </td>
    </tr>`;
  }
  el.cardTable.innerHTML = html;
  el.tableInfo.textContent = `共 ${filtered.length} 条（总 ${state.cards.length} 条）`;
}

// ── 生成卡密 ──
async function generateCards() {
  const count = parseInt(el.genCount.value) || 10;
  const days = parseInt(el.genDays.value) || 30;
  const remark = el.genRemark.value.trim();

  showModal('确认生成', `生成 ${count} 张卡密，有效期 ${days} 天${remark ? '，备注: ' + remark : ''}`, async () => {
    showToast('正在生成...', 'info');
    try {
      const r = await api('POST', '/admin/gen', { count, days, remark });
      if (r.cards) {
        showToast(`✅ 成功生成 ${r.cards.length} 张卡密`, 'success');
        await loadCards();
        await loadStats();
        // 弹窗显示新卡密
        if (r.cards.length > 0) {
          let msg = '新生成的卡密：\n';
          r.cards.slice(0, 10).forEach(c => { msg += c.card_key + '\n'; });
          if (r.cards.length > 10) msg += `...共 ${r.cards.length} 张`;
          showModal('生成成功', msg, () => {});
          // 复制到剪贴板
          const keys = r.cards.map(c => c.card_key).join('\n');
          try { await navigator.clipboard.writeText(keys); } catch(e) {}
        }
      } else {
        showToast('❌ ' + (r.msg || '生成失败'), 'error');
      }
    } catch (e) {
      showToast('❌ 请求失败: ' + e.message, 'error');
    }
  });
}

// ── 删除卡密 ──
async function deleteCard(cardKey) {
  showModal('确认删除', `删除卡密 ${cardKey}？此操作不可撤销！`, async () => {
    try {
      const r = await api('DELETE', `/admin/delete?card=${cardKey}`);
      if (r.msg) showToast('✅ ' + r.msg, 'success');
      await loadCards();
      await loadStats();
    } catch (e) {
      showToast('❌ 删除失败: ' + e.message, 'error');
    }
  });
}

// ── 解绑设备 ──
async function unbindCard(cardKey) {
  showModal('确认解绑', `解绑卡密 ${cardKey} 绑定的设备？`, async () => {
    try {
      const r = await api('POST', '/admin/unbind', { card_key: cardKey });
      if (r.msg) showToast('✅ ' + r.msg, 'success');
      await loadCards();
      await loadStats();
    } catch (e) {
      showToast('❌ 解绑失败: ' + e.message, 'error');
    }
  });
}

// ── 搜索 ──
document.addEventListener('DOMContentLoaded', () => {
  cacheDom();
  // 回车登录
  el.loginPwd.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  el.bearerToken.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  // 搜索防抖
  let searchTimer;
  el.searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(renderCards, 300);
  });
  // 密码聚焦
  el.loginPwd.focus();
});
</script>
</body>
</html>
